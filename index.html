<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dynamic Media Music</title>
  <link rel="icon" href="/public/DM_icon_logo_512.png" type="image/png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-primary: #0d1117;
      --dm-blue: #00aeef;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: linear-gradient(180deg, var(--bg-primary) 0%, var(--dm-blue) 100%);
      background-attachment: fixed;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .home-logo {
      display: block;
      width: 100%;
      max-width: min(280px, 70vw);
      height: auto;
    }
  </style>
</head>
<body>
  <script>
    (function () {
      var q = window.location.search;
      if (!q) return;
      var p = new URLSearchParams(q);
      if (
        p.has("template") ||
        p.has("email") ||
        p.has("contact_id") ||
        p.has("contactId") ||
        p.has("survey_record_id") ||
        p.has("survey_id") ||
        p.has("reference_id") ||
        p.has("survey_trigger") ||
        p.has("survey_type") ||
        p.has("type")
      ) {
        window.location.replace("/survey.html" + q + window.location.hash);
      }
    })();
  </script>
  <main role="main">
    <img src="/public/DM-Logo_White-2026.png" alt="Dynamic Media Music" class="home-logo" />
  </main>
</body>
</html>
